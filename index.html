<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Tetris</title>

<style>
html,body{
margin:0;
padding:0;
background:#0f172a;
font-family:Arial;
color:white;
overflow:hidden;
}

/* ===== LAYOUT ===== */

#gameWrapper{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
gap:40px;
}

canvas{
background:#0b1220;
border-radius:12px;
box-shadow:0 0 30px rgba(0,255,255,0.3);
}

/* ===== SIDE PANEL (DESKTOP ONLY) ===== */

#sidePanel{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
cursor:pointer;
}

button:hover{
background:#334155;
}

/* ===== MOBILE CONTROLS ===== */

#mobileControls{
display:none;
position:fixed;
bottom:20px;
left:0;
width:100%;
justify-content:center;
gap:50px;
}

.dpad{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.middleRow{
display:flex;
gap:10px;
}

.dpad button{
width:55px;
height:55px;
font-size:18px;
border-radius:10px;
}

.rotateBtn{
width:65px;
height:65px;
border-radius:50%;
font-size:20px;
}

/* Show mobile controls on small screens */
@media(max-width:768px){
#gameWrapper{
flex-direction:column;
gap:10px;
}

#sidePanel{
display:none;
}

#mobileControls{
display:flex;
}
}
</style>
</head>

<body>

<div id="gameWrapper">
<canvas id="game" width="300" height="600"></canvas>

<div id="sidePanel">
<div>NEXT</div>
<canvas id="next" width="120" height="120"></canvas>
<button id="pauseBtn">Pause</button>
<button id="musicBtn">Music ON</button>
</div>
</div>

<!-- MOBILE CONTROLS -->
<div id="mobileControls">
<div class="dpad">
<button onclick="rotatePiece()">▲</button>
<div class="middleRow">
<button onclick="moveLeft()">◀</button>
<button onclick="moveDown()">▼</button>
<button onclick="moveRight()">▶</button>
</div>
</div>
<button class="rotateBtn" onclick="hardDrop()">⤓</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const nextCanvas=document.getElementById("next");
const nextCtx=nextCanvas.getContext("2d");

const pauseBtn=document.getElementById("pauseBtn");
const musicBtn=document.getElementById("musicBtn");

const COLS=10;
const ROWS=20;
const SIZE=30;

let grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let piece,nextPiece;
let paused=false;
let musicOn=true;
let particles=[];

/* AUDIO */
const bgMusic=new Audio("bg.mp3");
bgMusic.loop=true;
bgMusic.volume=0.4;

const clearSound=new Audio("clear.mp3");

/* PIECES */
const shapes=[
{shape:[[1,1,1,1]],color:"#00f0ff"},
{shape:[[1,1],[1,1]],color:"#ffe600"},
{shape:[[0,1,0],[1,1,1]],color:"#a000ff"},
{shape:[[1,0,0],[1,1,1]],color:"#ff7a00"},
{shape:[[0,0,1],[1,1,1]],color:"#0077ff"},
{shape:[[1,1,0],[0,1,1]],color:"#00ff66"},
{shape:[[0,1,1],[1,1,0]],color:"#ff0033"}
];

function randomPiece(){
let p=shapes[Math.floor(Math.random()*shapes.length)];
return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function spawn(){
if(!nextPiece) nextPiece=randomPiece();
piece=nextPiece;
piece.x=3;
piece.y=0;
nextPiece=randomPiece();
drawNext();
if(collide()) resetGame();
}

/* COLLISION */

function collide(){
return piece.shape.some((row,dy)=>
row.some((v,dx)=>{
if(!v) return false;
let x=piece.x+dx;
let y=piece.y+dy;
return x<0||x>=COLS||y>=ROWS||(y>=0 && grid[y][x]);
}));
}

/* MERGE + CLEAR */

function merge(){
piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v) grid[piece.y+dy][piece.x+dx]=piece.color;
});
});
}

function clearLines(){
for(let y=ROWS-1;y>=0;y--){
if(grid[y].every(c=>c)){
grid.splice(y,1);
grid.unshift(Array(COLS).fill(null));
clearSound.play().catch(()=>{});
}
}
}

function resetGame(){
grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
}

/* DRAW */

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<ROWS;y++)
for(let x=0;x<COLS;x++)
if(grid[y][x]){
ctx.globalAlpha=0.6;
ctx.fillStyle=grid[y][x];
ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
ctx.strokeStyle="rgba(255,255,255,0.2)";
ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

ctx.globalAlpha=0.8;
piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v){
ctx.fillStyle=piece.color;
ctx.fillRect((piece.x+dx)*SIZE,(piece.y+dy)*SIZE,SIZE,SIZE);
}
});
});

if(paused){
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("PAUSED",90,300);
}
}

function drawNext(){
if(!nextCtx) return;
nextCtx.clearRect(0,0,120,120);
nextPiece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v){
nextCtx.fillStyle=nextPiece.color;
nextCtx.fillRect(dx*25+20,dy*25+20,25,25);
}
});
});
}

/* CONTROLS */

function moveLeft(){piece.x--; if(collide()) piece.x++;}
function moveRight(){piece.x++; if(collide()) piece.x--;}
function moveDown(){
piece.y++;
if(collide()){
piece.y--;
merge();
clearLines();
spawn();
}
}
function rotatePiece(){
let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
let old=piece.shape;
piece.shape=r;
if(collide()) piece.shape=old;
}
function hardDrop(){
while(!collide()) piece.y++;
piece.y--;
merge();
clearLines();
spawn();
}

document.addEventListener("keydown",e=>{
if(paused) return;
if(e.key==="ArrowLeft") moveLeft();
if(e.key==="ArrowRight") moveRight();
if(e.key==="ArrowDown") moveDown();
if(e.key==="ArrowUp") rotatePiece();
});

/* BUTTONS */

if(pauseBtn){
pauseBtn.onclick=()=>paused=!paused;
}

if(musicBtn){
musicBtn.onclick=()=>{
musicOn=!musicOn;
musicBtn.innerText=musicOn?"Music ON":"Music OFF";
if(musicOn) bgMusic.play().catch(()=>{});
else bgMusic.pause();
};
}

/* GRAVITY */

let dropCounter=0;
let dropInterval=800;
let lastTime=0;

function update(time=0){
const delta=time-lastTime;
lastTime=time;
dropCounter+=delta;

if(!paused && dropCounter>dropInterval){
piece.y++;
if(collide()){
piece.y--;
merge();
clearLines();
spawn();
}
dropCounter=0;
}

draw();
requestAnimationFrame(update);
}

/* START */

spawn();
update();

/* Safe audio start */
document.body.addEventListener("click",()=>{
if(musicOn){
bgMusic.play().catch(()=>{});
}
},{once:true});
</script>

</body>
</html>
