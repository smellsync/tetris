<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Glass Tetris</title>

<style>
html, body{
margin:0;
padding:0;
background:#0f172a;
overflow:hidden;
height:100%;
}

body{
position:fixed;
width:100%;
font-family:Arial;
color:white;
}

#gameWrapper{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
gap:40px;
}

canvas{
background:#0b1220;
border-radius:12px;
box-shadow:0 0 30px rgba(0,255,255,0.3);
}

#sidePanel{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
cursor:pointer;
}

button:hover{
background:#334155;
}
</style>
</head>

<body>

<div id="gameWrapper">
<canvas id="game" width="300" height="600"></canvas>

<div id="sidePanel">
<div>NEXT</div>
<canvas id="next" width="120" height="120"></canvas>
<button id="pauseBtn">Pause</button>
<button id="musicBtn">Music ON</button>
</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const nextCanvas=document.getElementById("next");
const nextCtx=nextCanvas.getContext("2d");

const pauseBtn=document.getElementById("pauseBtn");
const musicBtn=document.getElementById("musicBtn");

const COLS=10;
const ROWS=20;
const SIZE=30;

let grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let piece;
let nextPiece;
let particles=[];
let paused=false;
let musicOn=true;

/* ---------- AUDIO ---------- */
const bgMusic=new Audio("bg.mp3"); // replace with your file
bgMusic.loop=true;
bgMusic.volume=0.4;

const clearSound=new Audio("clear.mp3"); // replace with your file
clearSound.volume=0.6;

/* ---------- PIECES ---------- */
const shapes=[
{shape:[[1,1,1,1]], color:"#00f0ff"},
{shape:[[1,1],[1,1]], color:"#ffe600"},
{shape:[[0,1,0],[1,1,1]], color:"#a000ff"},
{shape:[[1,0,0],[1,1,1]], color:"#ff7a00"},
{shape:[[0,0,1],[1,1,1]], color:"#0077ff"},
{shape:[[1,1,0],[0,1,1]], color:"#00ff66"},
{shape:[[0,1,1],[1,1,0]], color:"#ff0033"}
];

function randomPiece(){
let p=shapes[Math.floor(Math.random()*shapes.length)];
return {shape:p.shape,color:p.color,x:3,y:0};
}

function spawnPiece(){
if(!nextPiece) nextPiece=randomPiece();
piece=nextPiece;
piece.x=3;
piece.y=0;
nextPiece=randomPiece();
drawNext();
if(collide()) resetGame();
}

/* ---------- DRAW ---------- */

function drawGlass(x,y,color,alpha=0.55){
let px=x*SIZE;
let py=y*SIZE;

ctx.save();
ctx.globalAlpha=alpha;
ctx.fillStyle=color;
ctx.fillRect(px,py,SIZE,SIZE);

let grad=ctx.createLinearGradient(px,py,px+SIZE,py+SIZE);
grad.addColorStop(0,"rgba(255,255,255,0.4)");
grad.addColorStop(1,"rgba(255,255,255,0)");
ctx.fillStyle=grad;
ctx.fillRect(px,py,SIZE,SIZE);

ctx.strokeStyle="rgba(255,255,255,0.25)";
ctx.strokeRect(px,py,SIZE,SIZE);
ctx.restore();
}

function drawGhost(){
let ghostY=piece.y;
while(!collisionAt(piece.x,ghostY+1)) ghostY++;

ctx.save();
ctx.globalAlpha=0.18;
ctx.setLineDash([4,4]);
ctx.strokeStyle="#ffffff";
ctx.lineWidth=1;

piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v){
ctx.strokeRect(
(piece.x+dx)*SIZE,
(ghostY+dy)*SIZE,
SIZE,
SIZE
);
}
});
});
ctx.restore();
}

function drawParticles(){
particles.forEach(p=>{
ctx.save();
ctx.globalAlpha=p.life;
ctx.translate(p.x,p.y);
ctx.rotate(p.rot);
ctx.fillStyle=p.color;
ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
ctx.restore();

p.x+=p.vx;
p.y+=p.vy;
p.vy+=0.2;
p.rot+=0.1;
p.life-=0.02;
});
particles=particles.filter(p=>p.life>0);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<ROWS;y++)
for(let x=0;x<COLS;x++)
if(grid[y][x])
drawGlass(x,y,grid[y][x]);

drawGhost();

piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v)
drawGlass(piece.x+dx,piece.y+dy,piece.color,0.65);
});
});

drawParticles();

if(paused){
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("PAUSED",70,300);
}
}

function drawNext(){
nextCtx.clearRect(0,0,120,120);
nextPiece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v){
let s=25;
nextCtx.globalAlpha=0.6;
nextCtx.fillStyle=nextPiece.color;
nextCtx.fillRect(dx*s+20,dy*s+20,s,s);
}
});
});
}

/* ---------- LOGIC ---------- */

function collide(){
return collisionAt(piece.x,piece.y);
}

function collisionAt(x,y){
return piece.shape.some((row,dy)=>
row.some((v,dx)=>{
if(!v) return false;
let nx=x+dx;
let ny=y+dy;
return nx<0||nx>=COLS||ny>=ROWS||grid[ny][nx];
}));
}

function merge(){
piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v)
grid[piece.y+dy][piece.x+dx]=piece.color;
});
});
}

function clearLines(){
for(let y=ROWS-1;y>=0;y--){
if(grid[y].every(cell=>cell)){
createShatter(y);
grid.splice(y,1);
grid.unshift(Array(COLS).fill(null));
if(musicOn) clearSound.play();
}
}
}

function createShatter(row){
for(let x=0;x<COLS;x++){
let color=grid[row][x];
for(let i=0;i<4;i++){
particles.push({
x:x*SIZE+SIZE/2,
y:row*SIZE+SIZE/2,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-1)*5,
size:8,
color:color,
rot:Math.random()*6,
life:1
});
}
}
}

function resetGame(){
grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
}

/* ---------- CONTROLS ---------- */

document.addEventListener("keydown",e=>{
if(paused) return;

if(e.key==="ArrowLeft"){piece.x--; if(collide()) piece.x++;}
if(e.key==="ArrowRight"){piece.x++; if(collide()) piece.x--;}
if(e.key==="ArrowDown"){
piece.y++;
if(collide()){
piece.y--;
merge();
clearLines();
spawnPiece();
}
}
if(e.key==="ArrowUp"){
let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
let old=piece.shape;
piece.shape=r;
if(collide()) piece.shape=old;
}
});

/* ---------- BUTTONS ---------- */

pauseBtn.onclick=()=>{
paused=!paused;
pauseBtn.innerText=paused?"Resume":"Pause";
};

musicBtn.onclick=()=>{
musicOn=!musicOn;
musicBtn.innerText=musicOn?"Music ON":"Music OFF";
if(musicOn) bgMusic.play();
else bgMusic.pause();
};

/* ---------- LOOP ---------- */

let dropInterval=700;
let lastTime=0;

function update(time=0){
if(!paused){
if(time-lastTime>dropInterval){
piece.y++;
if(collide()){
piece.y--;
merge();
clearLines();
spawnPiece();
}
lastTime=time;
}
}
draw();
requestAnimationFrame(update);
}

spawnPiece();
if(musicOn) bgMusic.play();
update();
</script>

</body>
</html>
