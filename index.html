<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Retro Glass Tetris</title>

<style>
html,body{
margin:0;
padding:0;
background:#0f172a;
overflow:hidden;
font-family:Arial;
}

/* ===== CONSOLE BODY ===== */

#console{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1e293b;
}

#bodyShell{
background:#cbd5e1;
border-radius:40px;
padding:40px 30px 140px 30px;
box-shadow:
inset -8px -8px 20px rgba(0,0,0,0.2),
inset 8px 8px 20px rgba(255,255,255,0.4),
0 20px 60px rgba(0,0,0,0.5);
position:relative;
}

#screenBezel{
background:#0b1220;
padding:20px;
border-radius:20px;
box-shadow:inset 0 0 20px rgba(0,0,0,0.6);
}

canvas{
display:block;
}

/* ===== SPEAKERS ===== */

.speaker{
position:absolute;
bottom:25px;
width:80px;
height:80px;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:4px;
}

.speaker div{
background:#94a3b8;
border-radius:50%;
width:6px;
height:6px;
}

#leftSpeaker{ left:30px; }
#rightSpeaker{ right:30px; }

/* ===== TOP BUTTONS ===== */

.topButtons{
position:absolute;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.topButtons button{
background:#475569;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
}

/* ===== CENTER D-PAD ===== */

#controls{
position:absolute;
bottom:20px;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:80px;
}

.dpad{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.middleRow{
display:flex;
gap:10px;
}

.dpad button{
width:55px;
height:55px;
background:#475569;
border:none;
border-radius:12px;
color:white;
font-size:20px;
box-shadow:0 4px 0 #334155;
}

.dpad button:active{
transform:translateY(3px);
box-shadow:0 1px 0 #334155;
}

.rotateBtn{
width:65px;
height:65px;
border-radius:50%;
background:#334155;
border:none;
color:white;
font-size:22px;
box-shadow:0 5px 0 #1f2937;
}

.rotateBtn:active{
transform:translateY(3px);
box-shadow:0 2px 0 #1f2937;
}

@media(min-width:768px){
#controls{ display:none; }
}
</style>
</head>

<body>

<div id="console">
<div id="bodyShell">

<div class="topButtons">
<button onclick="goHome()">🏠 Home</button>
<button onclick="togglePause()">⏸ Pause</button>
</div>

<div id="screenBezel">
<canvas id="game" width="300" height="600"></canvas>
</div>

<div id="controls">
<div class="dpad">
<button onclick="rotatePiece()">▲</button>
<div class="middleRow">
<button onclick="moveLeft()">◀</button>
<button onclick="moveDown()">▼</button>
<button onclick="moveRight()">▶</button>
</div>
</div>

<button class="rotateBtn" onclick="hardDrop()">⤓</button>
</div>

<div id="leftSpeaker" class="speaker"></div>
<div id="rightSpeaker" class="speaker"></div>

</div>
</div>

<script>
/* Speaker dots */
document.querySelectorAll(".speaker").forEach(s=>{
for(let i=0;i<36;i++){
let dot=document.createElement("div");
s.appendChild(dot);
}
});

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const COLS=10, ROWS=20, SIZE=30;
let grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let paused=false;
let piece,nextPiece;
let particles=[];
let musicOn=true;

/* AUDIO */
const bgMusic=new Audio("bg.mp3");
bgMusic.loop=true;
bgMusic.volume=0.4;

const clearSound=new Audio("clear.mp3");

/* PIECES */
const shapes=[
{shape:[[1,1,1,1]],color:"#00f0ff"},
{shape:[[1,1],[1,1]],color:"#ffe600"},
{shape:[[0,1,0],[1,1,1]],color:"#a000ff"},
{shape:[[1,0,0],[1,1,1]],color:"#ff7a00"},
{shape:[[0,0,1],[1,1,1]],color:"#0077ff"},
{shape:[[1,1,0],[0,1,1]],color:"#00ff66"},
{shape:[[0,1,1],[1,1,0]],color:"#ff0033"}
];

function randomPiece(){
let p=shapes[Math.floor(Math.random()*shapes.length)];
return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function spawn(){
if(!nextPiece) nextPiece=randomPiece();
piece=nextPiece;
piece.x=3; piece.y=0;
nextPiece=randomPiece();
if(collide()) reset();
}

function collide(){
return piece.shape.some((row,dy)=>
row.some((v,dx)=>{
if(!v) return false;
let x=piece.x+dx;
let y=piece.y+dy;
return x<0||x>=COLS||y>=ROWS||grid[y]?.[x];
}));
}

function merge(){
piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v) grid[piece.y+dy][piece.x+dx]=piece.color;
});
});
}

function clearLines(){
for(let y=ROWS-1;y>=0;y--){
if(grid[y].every(c=>c)){
createShatter(y);
grid.splice(y,1);
grid.unshift(Array(COLS).fill(null));
clearSound.play().catch(()=>{});
if(navigator.vibrate) navigator.vibrate(120);
}
}
}

function createShatter(row){
for(let x=0;x<COLS;x++){
for(let i=0;i<4;i++){
particles.push({
x:x*SIZE+15,
y:row*SIZE+15,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-1)*6,
life:1,
color:grid[row][x]
});
}
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<ROWS;y++)
for(let x=0;x<COLS;x++)
if(grid[y][x]){
ctx.globalAlpha=0.6;
ctx.fillStyle=grid[y][x];
ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
ctx.strokeStyle="rgba(255,255,255,0.3)";
ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

ctx.globalAlpha=0.8;
piece.shape.forEach((row,dy)=>{
row.forEach((v,dx)=>{
if(v){
ctx.fillStyle=piece.color;
ctx.fillRect((piece.x+dx)*SIZE,(piece.y+dy)*SIZE,SIZE,SIZE);
}
});
});

particles.forEach(p=>{
ctx.globalAlpha=p.life;
ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,6,6);
p.x+=p.vx;
p.y+=p.vy;
p.vy+=0.2;
p.life-=0.03;
});
particles=particles.filter(p=>p.life>0);

if(paused){
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("PAUSED",90,300);
}
}

/* Proper gravity */
let dropCounter=0;
let dropInterval=800;
let lastTime=0;

function update(time=0){
const delta=time-lastTime;
lastTime=time;
dropCounter+=delta;

if(!paused && dropCounter>dropInterval){
piece.y++;
if(collide()){
piece.y--;
merge();
clearLines();
spawn();
}
dropCounter=0;
}

draw();
requestAnimationFrame(update);
}

/* Controls */
function moveLeft(){ piece.x--; if(collide()) piece.x++; }
function moveRight(){ piece.x++; if(collide()) piece.x--; }
function moveDown(){ piece.y++; if(collide()){piece.y--; merge(); clearLines(); spawn();}}
function rotatePiece(){
let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
let old=piece.shape;
piece.shape=r;
if(collide()) piece.shape=old;
}
function hardDrop(){
while(!collide()) piece.y++;
piece.y--;
merge(); clearLines(); spawn();
}
function togglePause(){ paused=!paused; }
function goHome(){ window.history.back(); }

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") moveLeft();
if(e.key==="ArrowRight") moveRight();
if(e.key==="ArrowDown") moveDown();
if(e.key==="ArrowUp") rotatePiece();
});

/* Start */
spawn();
update();

/* Safe audio start after interaction */
document.body.addEventListener("click",()=>{
if(musicOn){
bgMusic.play().catch(()=>{});
}
},{once:true});
</script>

</body>
</html>
